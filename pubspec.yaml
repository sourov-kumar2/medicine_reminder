name: medicine_reminder
description: বাবার ওষুধ রিমাইন্ডার অ্যাপ

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.9.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

  # Battery optimization & permissions
  permission_handler: ^11.3.1

  # Alarm popup screen
  wakelock_plus: ^1.2.8

  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/alarm.mp3
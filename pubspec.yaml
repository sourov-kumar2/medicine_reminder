name: medicine_reminder
description: বাবার ওষুধ রিমাইন্ডার অ্যাপ

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Notifications & Alarms
  awesome_notifications: ^0.9.3+1
  android_alarm_manager_plus: ^3.0.3

  # Permissions
  permission_handler: ^11.3.1

  # Bengali Font
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true